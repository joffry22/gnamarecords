<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Profiles | GNAMA RECORDS</title>
  <meta name="description" content="Explore GNAMA RECORDS artists, read Spotify descriptions, and open each artist profile on Spotify.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --dark: #11161f;
      --dark2: #1a2130;
      --line: rgba(255,255,255,0.14);
      --white: #f5f5f0;
      --muted: rgba(245,245,240,0.72);
      --gold: #c9a84c;
      --gold2: #e8c96a;
      --font-display: 'Bebas Neue', sans-serif;
      --font-condensed: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }

    body {
      font-family: var(--font-body);
      color: var(--white);
      background:
        radial-gradient(950px 520px at -8% -12%, rgba(232,201,106,0.1), transparent 58%),
        radial-gradient(1000px 560px at 108% 0%, rgba(88,122,220,0.14), transparent 62%),
        linear-gradient(180deg, #070b12 0%, #0a1018 52%, #05070c 100%);
      padding: 34px 22px 58px;
    }

    .wrap { max-width: 1240px; margin: 0 auto; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand {
      text-decoration: none;
      font-family: var(--font-display);
      color: var(--white);
      letter-spacing: 3.8px;
      font-size: 28px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .brand img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      border-radius: 8px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.35));
    }

    .brand span { color: var(--gold); }

    .back-btn {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      color: var(--white);
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 999px;
      font-family: var(--font-condensed);
      letter-spacing: 1.8px;
      text-transform: uppercase;
      font-size: 12px;
      transition: transform 0.22s ease, border-color 0.22s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover { transform: translateY(-2px); border-color: rgba(201,168,76,0.58); }

    @property --border-glow {
      syntax: '<number>';
      inherits: false;
      initial-value: 0.4;
    }

    .profile-hero {
      border: 2px solid rgba(201,168,76,0.5);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 24px 54px rgba(0,0,0,0.34), 0 0 30px rgba(201,168,76,calc(var(--border-glow) * 0.3));
      display: grid;
      grid-template-columns: 370px minmax(0, 1fr);
      min-height: 440px;
      margin-bottom: 24px;
      isolation: isolate;
      position: relative;
      /* static gold border with brightness pulse */
      animation: borderPulse 3s ease-in-out infinite;
    }
    @keyframes borderPulse {
      0%, 100% {
        border-color: rgba(201,168,76,0.35);
        box-shadow: 0 24px 54px rgba(0,0,0,0.34), 0 0 15px rgba(201,168,76,0.1);
      }
      50% {
        border-color: rgba(232,201,106,0.9);
        box-shadow: 0 24px 54px rgba(0,0,0,0.34), 0 0 40px rgba(201,168,76,0.35), 0 0 80px rgba(201,168,76,0.15);
      }
    }

    .profile-hero::before {
      content: '';
      position: absolute;
      inset: -45% auto auto -12%;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.28), rgba(201,168,76,0));
      pointer-events: none;
      z-index: 0;
    }

    .hero-media {
      border-right: 1px solid var(--line);
      background: rgba(10,10,10,0.56);
      overflow: hidden;
      position: relative;
    }

    .hero-media::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,10,0.68), rgba(10,10,10,0.12));
      pointer-events: none;
    }

    .hero-media img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transform: scale(1.01);
      animation: heroFloat 8s ease-in-out infinite alternate;
    }

    .hero-copy {
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .kicker {
      font-family: var(--font-condensed);
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--gold);
      font-size: 12px;
    }

    h1 {
      font-family: var(--font-display);
      letter-spacing: 2.8px;
      font-size: clamp(40px, 6vw, 76px);
      line-height: 0.9;
      margin: 2px 0;
      text-wrap: balance;
    }

    .profile-sub {
      font-family: var(--font-condensed);
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(245,245,240,0.86);
      font-size: 13px;
    }

    .profile-desc {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
      max-width: 62ch;
      white-space: pre-line;
    }

    .cta-row {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 11px 17px;
      text-decoration: none;
      font-family: var(--font-condensed);
      text-transform: uppercase;
      letter-spacing: 1.9px;
      font-size: 12px;
      font-weight: 700;
      transition: transform 0.24s ease, border-color 0.24s ease, box-shadow 0.24s ease, background 0.24s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transform: translateY(0);
    }

    .btn-primary {
      color: var(--black);
      background: linear-gradient(120deg, var(--gold), var(--gold2));
      box-shadow: 0 10px 24px rgba(201,168,76,0.3);
    }

    .btn-outline {
      color: var(--white);
      background: rgba(255,255,255,0.03);
      border-color: var(--line);
    }

    .btn:hover {
      transform: translateY(-3px);
      border-color: rgba(201,168,76,0.56);
      box-shadow: 0 14px 28px rgba(0,0,0,0.34);
    }

    .all-section {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      box-shadow: 0 20px 44px rgba(0,0,0,0.3);
    }

    .all-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .all-head h2 {
      font-family: var(--font-display);
      font-size: clamp(34px, 4vw, 54px);
      letter-spacing: 2.4px;
      line-height: 0.92;
    }

    .all-lead {
      color: var(--muted);
      line-height: 1.65;
      max-width: 70ch;
      margin-top: 6px;
      font-size: 14px;
    }

    .search {
      width: min(360px, 100%);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(8,11,16,0.72);
      color: var(--white);
      padding: 12px 14px;
      font-family: var(--font-body);
      font-size: 14px;
    }

    .search:focus {
      outline: 2px solid rgba(201,168,76,0.48);
      outline-offset: 2px;
    }

    .artist-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .artist-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(8,11,16,0.65);
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      min-height: 130px;
      box-shadow: 0 16px 32px rgba(0,0,0,0.3);
      animation: cardFloat 6.8s ease-in-out infinite;
      transform: translateY(0);
      transition: transform 0.24s ease, border-color 0.24s ease, box-shadow 0.24s ease;
    }

    .artist-card:nth-child(2n) { animation-delay: -1.2s; }
    .artist-card:nth-child(3n) { animation-delay: -2.4s; }

    .artist-card:hover {
      transform: translateY(-7px);
      border-color: rgba(201,168,76,0.52);
      box-shadow: 0 24px 46px rgba(0,0,0,0.4);
      animation-play-state: paused;
    }

    .artist-card.selected {
      border-color: rgba(201,168,76,0.72);
      box-shadow: 0 24px 46px rgba(0,0,0,0.42), 0 0 0 1px rgba(201,168,76,0.4) inset;
    }

    .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-body {
      padding: 12px 13px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .card-name {
      font-family: var(--font-display);
      font-size: 30px;
      letter-spacing: 1.5px;
      line-height: 0.92;
    }

    .card-desc {
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
      min-height: 38px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-actions {
      margin-top: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-actions a {
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      font-family: var(--font-condensed);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.6px;
      color: var(--white);
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .card-actions a:hover { border-color: rgba(201,168,76,0.58); transform: translateY(-2px); }

    .empty-state {
      margin-top: 12px;
      color: rgba(245,245,240,0.78);
      font-size: 14px;
      display: none;
    }

    @keyframes heroFloat {
      from { transform: scale(1.01) translateY(0px); }
      to { transform: scale(1.05) translateY(-8px); }
    }

    @keyframes cardFloat {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
      100% { transform: translateY(0px); }
    }

    @media (max-width: 1024px) {
      .profile-hero {
        grid-template-columns: minmax(0, 1fr);
      }

      .hero-media {
        min-height: 280px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .artist-grid {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    @media (max-width: 680px) {
      body { padding: 22px 12px 46px; }
      .brand { font-size: 22px; letter-spacing: 3px; }
      .brand img { width: 29px; height: 29px; }
      .topbar { margin-bottom: 18px; }
      .hero-copy { padding: 20px; }
      .all-section { padding: 16px; }
      .artist-card { grid-template-columns: 88px minmax(0, 1fr); }
      .card-name { font-size: 24px; }
    }



    /* ═══ PAGE LEAVE TRANSITION ═══ */
    .page-leave { position: fixed; inset: 0; z-index: 99998; background: var(--black); transform: scaleY(0); transform-origin: bottom; pointer-events: none; }
    .page-leave.active { animation: pageLeaveAnim 0.55s cubic-bezier(0.7,0,0.3,1) forwards; }
    @keyframes pageLeaveAnim {
      0% { transform: scaleY(0); transform-origin: bottom; }
      50% { transform: scaleY(1); transform-origin: bottom; }
      51% { transform-origin: top; }
      100% { transform: scaleY(0); transform-origin: top; }
    }

    /* ═══ CARD ENTRANCE ═══ */
    .artist-card { opacity: 0; transform: translateY(24px) scale(0.97); filter: blur(4px); }
    .artist-card.card-visible { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); transition: opacity 0.55s cubic-bezier(0.22,0.61,0.36,1), transform 0.55s cubic-bezier(0.22,0.61,0.36,1), filter 0.55s cubic-bezier(0.22,0.61,0.36,1); }

    /* ═══ NOISE OVERLAY ═══ */
    body::after { content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.026; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-repeat: repeat; background-size: 200px 200px; }

    /* ═══ BUTTON SHIMMER ═══ */
    .btn { position: relative; overflow: hidden; isolation: isolate; }
    .btn::after { content: ''; position: absolute; top: -20%; bottom: -20%; left: -140%; width: 34%; background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%); transform: skewX(-18deg); transition: left 0.6s cubic-bezier(0.22,0.61,0.36,1); z-index: -1; }
    .btn:hover::after { left: 125%; }

    @media (prefers-reduced-motion: reduce) {
      .artist-card { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; filter: none !important; }
      .cursor-dot, .cursor-trail { display: none !important; }
      body::after { animation: none !important; }
      .profile-hero, .all-section { opacity: 1 !important; transform: none !important; }
    }

    /* ═══ ULTRA ANIMATION UPGRADE ═══ */

    /* CURSOR TRAIL */
    .cursor-dot {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      pointer-events: none;
      z-index: 99997;
      mix-blend-mode: difference;
      transition: width 0.25s ease, height 0.25s ease, opacity 0.25s ease;
    }
    .cursor-dot.hovering {
      width: 20px; height: 20px;
      margin-left: -6px; margin-top: -6px;
      opacity: 0.7;
    }
    .cursor-trail {
      position: fixed;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold);
      pointer-events: none;
      z-index: 99996;
      opacity: 0;
    }

    /* MOUSE-FOLLOW GLOW */
    .card-glow {
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.16) 0%, transparent 70%);
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.35s ease;
      mix-blend-mode: screen;
    }

    /* ANIMATED NOISE */
    body::after {
      animation: noiseShift 0.8s steps(4) infinite;
    }
    @keyframes noiseShift {
      0%   { background-position: 0 0; }
      25%  { background-position: 100px 50px; }
      50%  { background-position: -50px 100px; }
      75%  { background-position: 80px -30px; }
      100% { background-position: 0 0; }
    }

    /* SEARCH INPUT GLOW */
    .search {
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .search:focus {
      border-color: rgba(201,168,76,0.5);
      box-shadow: 0 0 20px rgba(201,168,76,0.15), 0 0 4px rgba(201,168,76,0.2);
    }

    /* NAME HOVER GLOW */
    .card-name {
      transition: text-shadow 0.3s ease, color 0.3s ease;
    }
    .artist-card:hover .card-name {
      text-shadow: 0 0 16px rgba(201,168,76,0.4);
      color: var(--gold2);
    }

    /* CARD ACTIONS SLIDE UP */
    .card-actions {
      transform: translateY(8px);
      opacity: 0.6;
      transition: transform 0.35s cubic-bezier(0.22,0.61,0.36,1), opacity 0.35s ease;
    }
    .artist-card:hover .card-actions {
      transform: translateY(0);
      opacity: 1;
    }

    /* SECTION ENTRANCE ORCHESTRATION */
    .profile-hero {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s cubic-bezier(0.22,0.61,0.36,1), transform 0.8s cubic-bezier(0.22,0.61,0.36,1);
    }
    .profile-hero.entered {
      opacity: 1;
      transform: translateY(0);
    }
    .all-section {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s cubic-bezier(0.22,0.61,0.36,1) 0.25s, transform 0.8s cubic-bezier(0.22,0.61,0.36,1) 0.25s;
    }
    .all-section.entered {
      opacity: 1;
      transform: translateY(0);
    }

    /* HERO IMAGE PARALLAX */
    .hero-media img {
      transition: transform 0.1s ease-out;
    }

    /* ARTIST CARD ENHANCED */
    .artist-card {
      position: relative;
      overflow: hidden;
    }

    @media (pointer: coarse) {
      .cursor-dot, .cursor-trail { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-trail" id="trail0"></div>
  <div class="cursor-trail" id="trail1"></div>
  <div class="cursor-trail" id="trail2"></div>
  <div class="cursor-trail" id="trail3"></div>
  <div class="cursor-trail" id="trail4"></div>

  <div class="page-leave" id="pageLeave"></div>

  <div class="wrap">
    <header class="topbar">
      <a class="back-btn" href="GNAMA RECORDS.html">Back to Home</a>
      <a class="brand" href="GNAMA RECORDS.html"><img src="LOGO.png" alt="GNAMA Records logo" loading="eager" decoding="async">GNAMA <span>RECORDS</span></a>
    </header>

    <section class="profile-hero" id="profileHero">
      <div class="hero-media">
        <img id="artistImage" alt="Featured artist image" loading="eager" decoding="async">
      </div>
      <div class="hero-copy">
        <p class="kicker">Spotlight</p>
        <h1 id="artistName">Artist</h1>
        <p class="profile-sub">Spotify More Info</p>
        <p class="profile-desc" id="artistDescription"></p>
        <div class="cta-row">
          <a class="btn btn-primary" id="spotifyCta" href="#" target="_blank" rel="noopener">Open on Spotify</a>
          <a class="btn btn-outline" href="#all-artists">View All Artists</a>
        </div>
      </div>
    </section>

    <section class="all-section" id="all-artists">
      <div class="all-head">
        <div>
          <p class="kicker">Artists</p>
          <h2>View All</h2>
          <p class="all-lead">Every GNAMA RECORDS artist in one place. Descriptions below come from each Spotify profile "More info" section.</p>
        </div>
        <input class="search" id="artistSearch" type="search" placeholder="Search by artist or description" aria-label="Search artists">
      </div>
      <div class="artist-grid" id="artistGrid"></div>
      <p class="empty-state" id="emptyState">No artist found for this search.</p>
    </section>
  </div>

  <script>
    const ARTISTS = [
      {
        slug: 'dj-mps',
        name: 'DJ MPS',
        description: 'Make music for fun.\nJesus is LORD.',
        spotifyUrl: 'https://open.spotify.com/intl-fr/artist/2L4sMVJ4e6W7vzR7ickM8q?si=UCLb4ZhmSZylqHq0vkfd2Q',
        image: 'https://i.scdn.co/image/ab6761610000e5eb1964f2099964aeeffd6c12cf'
      },
      {
        slug: 'traxxenn',
        name: 'TRAXXENN',
        description: 'Noob phonk producer.',
        spotifyUrl: 'https://open.spotify.com/intl-fr/artist/1Vlomsuf5lh9EPadKYWfo7?si=8MWY35zBSAa5xVZ5Fxz0_Q',
        image: 'https://i.scdn.co/image/ab6761610000e5eb84d5fba48b436fc399294b31'
      },
      {
        slug: 'dj-kitsxu',
        name: 'DJ KITSXU',
        description: 'No public artist biography is currently available on Spotify.',
        spotifyUrl: 'https://open.spotify.com/intl-fr/artist/0Q3JvO6keTfcb8V9iUyi6A?si=WqWbdnAcRKu37C7C0YaJaw',
        image: 'https://i.scdn.co/image/ab6761610000e5eb2d223064b490d1e520e37899'
      },
      {
        slug: 'fake-luca',
        name: 'Fake.Luca',
        description: 'Fake.Luca is a 14 year old phonk artist, also known as Fake.Luca_Spotify on TikTok. He started making music in late 2023.\nThank you very much to everyone for 20K monthly listeners again, you are crazy.\nNEVER GIVE UP! We will reach the millions one day.\nInstagram: https://www.instagram.com/fake.luca_ch?igsh=c2tqZ2o0Mm03aHdt&utm_source=qr\nTikTok: https://www.tiktok.com/@fake.luca_?_r=1&_t=ZN-93psOhaq5Nm\nYouTube: https://youtube.com/@fake.lucaofficial?si=RBdA1p5k9KgvsN35',
        spotifyUrl: 'https://open.spotify.com/intl-fr/artist/2sWTkzH5ugVBiYXjsw3MkM?si=betcjWeiRAyVT1-H4EIuKA',
        image: 'https://i.scdn.co/image/ab6761610000e5eba03342252d00267bfbfec89b'
      }
    ];

    const elements = {
      name: document.getElementById('artistName'),
      image: document.getElementById('artistImage'),
      description: document.getElementById('artistDescription'),
      spotifyCta: document.getElementById('spotifyCta'),
      search: document.getElementById('artistSearch'),
      grid: document.getElementById('artistGrid'),
      empty: document.getElementById('emptyState')
    };

    function getArtistFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get('artist');
    }

    function updateProfile(artist) {
      elements.name.textContent = artist.name;
      elements.image.src = artist.image;
      elements.image.alt = artist.name + ' artist photo';
      elements.description.textContent = artist.description;
      elements.spotifyCta.href = artist.spotifyUrl;
      document.title = artist.name + ' | Artist Profile | GNAMA RECORDS';
    }

    function cardTemplate(artist, isSelected) {
      return `
        <article class="artist-card${isSelected ? ' selected' : ''}">
          <img class="thumb" src="${artist.image}" alt="${artist.name} photo" loading="lazy" decoding="async">
          <div class="card-body">
            <h3 class="card-name">${artist.name}</h3>
            <p class="card-desc">${artist.description}</p>
            <div class="card-actions">
              <a href="?artist=${artist.slug}">Profile</a>
              <a href="${artist.spotifyUrl}" target="_blank" rel="noopener">Spotify</a>
            </div>
          </div>
        </article>
      `;
    }

    function renderArtistGrid(filter, selectedSlug) {
      const search = (filter || '').trim().toLowerCase();
      const filtered = ARTISTS.filter((artist) => {
        const haystack = (artist.name + ' ' + artist.description).toLowerCase();
        return haystack.includes(search);
      });

      elements.grid.innerHTML = filtered.map((artist) => cardTemplate(artist, artist.slug === selectedSlug)).join('');
      elements.empty.style.display = filtered.length ? 'none' : 'block';

      // Stagger card entrance
      const cards = elements.grid.querySelectorAll('.artist-card');
      cards.forEach((card, i) => {
        setTimeout(() => card.classList.add('card-visible'), 80 + i * 100);
      });
    }

    const selectedSlug = getArtistFromQuery();
    const selectedArtist = ARTISTS.find((artist) => artist.slug === selectedSlug) || ARTISTS[0];

    updateProfile(selectedArtist);
    renderArtistGrid('', selectedArtist.slug);

    elements.search.addEventListener('input', (event) => {
      renderArtistGrid(event.target.value, selectedArtist.slug);
    });

    // ═══ CURSOR TRAIL SYSTEM ═══
    (function() {
      const dot = document.getElementById('cursorDot');
      if (!dot || window.matchMedia('(pointer: coarse)').matches) return;
      const trailEls = [0,1,2,3,4].map(i => document.getElementById('trail' + i));
      const trailPos = trailEls.map(() => ({ x: 0, y: 0 }));
      let mouseX = 0, mouseY = 0;
      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX; mouseY = e.clientY;
        dot.style.left = mouseX + 'px'; dot.style.top = mouseY + 'px';
      });
      function animateTrail() {
        trailEls.forEach((el, i) => {
          const prev = i === 0 ? { x: mouseX, y: mouseY } : trailPos[i - 1];
          const speed = 0.25 - i * 0.03;
          trailPos[i].x += (prev.x - trailPos[i].x) * speed;
          trailPos[i].y += (prev.y - trailPos[i].y) * speed;
          el.style.left = trailPos[i].x + 'px'; el.style.top = trailPos[i].y + 'px';
          el.style.opacity = String(0.5 - i * 0.08);
          el.style.width = el.style.height = (4 - i * 0.5) + 'px';
        });
        requestAnimationFrame(animateTrail);
      }
      animateTrail();
      document.addEventListener('mouseover', (e) => {
        if (e.target.closest('a, button, .artist-card, .btn, .back-btn, .search')) dot.classList.add('hovering');
        else dot.classList.remove('hovering');
      });
    })();

    // ═══ SECTION ENTRANCE ORCHESTRATION ═══
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      const profileHero = document.getElementById('profileHero');
      const allSection = document.querySelector('.all-section');
      setTimeout(() => { if (profileHero) profileHero.classList.add('entered'); }, 100);
      setTimeout(() => { if (allSection) allSection.classList.add('entered'); }, 350);

      // ═══ HERO IMAGE SCROLL PARALLAX ═══
      const heroImg = document.getElementById('artistImage');
      if (heroImg) {
        window.addEventListener('scroll', () => {
          const y = window.scrollY;
          heroImg.style.transform = `scale(${1.01 + y * 0.0002}) translateY(${(y * 0.06).toFixed(2)}px)`;
        }, { passive: true });
      }

      // ═══ MOUSE-FOLLOW GLOW ON CARDS ═══
      const addGlow = () => {
        document.querySelectorAll('.artist-card').forEach(card => {
          if (card.querySelector('.card-glow')) return;
          const glow = document.createElement('div');
          glow.className = 'card-glow';
          card.appendChild(glow);
          card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            glow.style.left = (e.clientX - rect.left) + 'px';
            glow.style.top = (e.clientY - rect.top) + 'px';
            glow.style.opacity = '1';
          });
          card.addEventListener('mouseleave', () => { glow.style.opacity = '0'; });
        });
      };
      addGlow();

      // Re-apply glow after search re-render
      const origSearchHandler = elements.search.oninput;
      elements.search.addEventListener('input', () => { setTimeout(addGlow, 200); });
    }

    // ═══ PAGE LEAVE FOR LINKS ═══
    document.querySelectorAll('a[href]').forEach(a => {
      const href = a.getAttribute('href');
      if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('?') || a.target === '_blank') return;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const pl = document.getElementById('pageLeave');
        if (pl) { pl.classList.add('active'); setTimeout(() => { window.location.href = href; }, 450); }
        else { window.location.href = href; }
      });
    });
  </script>
</body>
</html>
